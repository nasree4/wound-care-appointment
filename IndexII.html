<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบใบนัดโรงพยาบาลเจาะไอร้อง</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .logo-bw {
            /* ดัน Contrast ขั้นสุด และลด Brightness เพื่อบังคับสีให้เป็น #000000 ขาวดำ 100% */
            filter: grayscale(100%) brightness(60%) contrast(2000%);
            -webkit-filter: grayscale(100%) brightness(60%) contrast(2000%);
        }
        
        /* ตั้งค่าสำหรับการพิมพ์ */
        @media print {
            body { 
                background: white !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .print\:hidden { 
                display: none !important; 
                visibility: hidden !important; 
                height: 0 !important; 
                overflow: hidden !important; 
            }
            @page { 
                size: 105mm 148mm; /* ปรับขนาดกระดาษเป็น A6 มาตรฐาน */
                margin: 0; 
            }
            .print-area { 
                width: 105mm !important; 
                height: 148mm !important; 
                border: none !important; 
                padding: 4mm !important; /* ลดขอบกระดาษลงเพื่อเพิ่มพื้นที่ด้านใน */
                margin: 0 !important; 
                box-sizing: border-box; 
                box-shadow: none !important; 
                position: absolute !important; 
                top: 0 !important;
                left: 0 !important; 
                visibility: visible !important; 
                display: flex !important;
                color: #000000 !important;
                background: white !important;
            }
            img.header-logo { max-height: 60px !important; }
            .watermark { opacity: 0.25 !important; }
            .print-area * {
                color: #000000 !important;
                border-color: #000000 !important;
            }
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @media screen {
            .print-area {
                width: 105mm; /* พรีวิวหน้าจอให้ตรงกับขนาด A6 */
                height: 148mm;
            }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        const WOUND_TYPES = [
            "Laceration (แผลฉีกขาด)", "Abrasion (แผลถลอก)", "I&D (กรีดระบายหนอง)", 
            "Puncture (แผลถูกแทง)", "Avulsion (แผลถูกกระชาก)", "Excision (การตัดเนื้อออก)",
            "Cellulitis", "Amputate", "สัตว์กัด (Animal bite)", "สัตว์ข่วน (Animal scratch)", 
            "Burn", "ถอดเล็บ (Nail extraction)", "แผลเบาหวาน(DM Ulcer)", "แผลผ่าตัด (Surgical wound)", 
            "Debridement", "Aspirate"
        ];
        
        const BODY_LOCATIONS = [
            "Head (ศีรษะ)", "Face (ใบหน้า)", "Eye (ดวงตา)", "Ear (หู)", "Nose (จมูก)", "Mouth (ปาก)", 
            "Neck (คอ)", "Shoulder (ไหล่)", "Chest (หน้าอก)", "Back (หลัง)", "Abdomen (หน้าท้อง)", 
            "Arm (แขน)", "Hand (มือ)", "Finger (นิ้วมือ)", "Leg (ขา)", "Knee (เข่า)", "Foot (เท้า)", "Toe (นิ้วเท้า)",
            "Bottom (ก้น)", "Penis (องคชาต)", "Breast (หน้าอก/เต้านม)", "Vagina (ช่องคลอด)", "Scrotum (ถุงอัณฑะ)"
        ];
        
        const PRIVILEGES = [
            "บัตรทอง (UC)", "ประกันสังคม (SSS)", "พรบ. (Motor Act)", 
            "ข้าราชการ (CSMBS)", "อปท.", "รัฐวิสาหกิจ", "ประกันชีวิต/บริษัท", 
            "เงินสด (Cash)", "อื่นๆ"
        ];

        const DRAFT_KEY = 'woundcare_draft_v1';

        const addDays = (dateStr, n) => {
            const [y, m, d] = dateStr.split('-').map(Number);
            const res = new Date(y, m - 1, d);
            res.setDate(res.getDate() + n);
            return `${res.getFullYear()}-${String(res.getMonth()+1).padStart(2,'0')}-${String(res.getDate()).padStart(2,'0')}`;
        };

        const addMonths = (dateStr, n) => {
            const [y, m, d] = dateStr.split('-').map(Number);
            const res = new Date(y, m - 1 + n, d);
            return `${res.getFullYear()}-${String(res.getMonth()+1).padStart(2,'0')}-${String(res.getDate()).padStart(2,'0')}`;
        };

        const formatThaiDate = (dateStr, opts) => {
            if (!dateStr || typeof dateStr !== 'string' || !dateStr.includes('-')) return '-';
            const parts = dateStr.split('-').map(Number);
            if (parts.length !== 3 || parts.some(isNaN)) return '-';
            const [y, m, d] = parts;
            const date = new Date(y, m - 1, d);
            return date.toLocaleDateString('th-TH', opts);
        };

        const calculateAge = (birthday) => {
            if (!birthday || birthday === '-' || typeof birthday !== 'string') return '';
            let birthDate;
            
            // รองรับรูปแบบ DD/MM/YYYY หรือ YYYY-MM-DD
            if (birthday.includes('/')) {
                const parts = birthday.split('/');
                if (parts.length === 3) {
                    let year = parseInt(parts[2], 10);
                    if (year > 2400) year -= 543; // แปลง พ.ศ. เป็น ค.ศ.
                    birthDate = new Date(year, parseInt(parts[1], 10) - 1, parseInt(parts[0], 10));
                }
            } else if (birthday.includes('-')) {
                const parts = birthday.split('-');
                if (parts.length === 3) {
                    let year = parseInt(parts[0], 10);
                    if (year > 2400) year -= 543;
                    birthDate = new Date(year, parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                }
            } else {
                birthDate = new Date(birthday);
            }

            if (!birthDate || isNaN(birthDate.getTime())) return '';

            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age >= 0 ? age : '';
        };

        const validateAppointment = (patient, appt) => {
            const errors = [];
            if (!patient) {
                errors.push('กรุณาระบุข้อมูลหรือค้นหาคนไข้');
                return errors;
            }
            if (!patient.hn || String(patient.hn).trim() === '') errors.push('HN ไม่ถูกต้อง');
            if (!patient.fname || String(patient.fname).trim() === '') errors.push('กรุณากรอกชื่อคนไข้');

            if (appt.weight !== '') {
                const w = parseFloat(appt.weight);
                if (isNaN(w) || w <= 0 || w > 300) errors.push('น้ำหนักต้องอยู่ระหว่าง 1–300 กก.');
            }

            if (appt.stitchCount !== '') {
                const s = parseInt(appt.stitchCount);
                if (isNaN(s) || s < 0 || s > 200) errors.push('จำนวนเข็มต้องอยู่ระหว่าง 0–200');
            }

            if (appt.stitchRemovalDate && appt.stitchRemovalDate <= appt.visitDate) {
                errors.push('วันนัดตัดไหมต้องหลังวันรับบริการ');
            }

            return errors;
        };

        const safeStr = (val) => (val === null || val === undefined) ? '' : String(val);

        const defaultAppointment = {
            visitDate: new Date().toLocaleDateString('en-CA'),
            weight: '', privilege: '', woundType: '', woundLocation: '',
            stitchCount: '', dressingFrequency: 'ทุกวัน', stitchRemovalDate: '',
            staffName: 'เจ้าหน้าที่พยาบาล', calculatedDates: []
        };

        const ValidationErrors = ({ errors, onDismiss }) => {
            if (!errors || errors.length === 0) return null;
            return (
                <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] bg-rose-50 border-2 border-rose-400 rounded-3xl shadow-2xl px-6 py-4 max-w-sm w-[90vw] animate-in slide-in-from-top-4">
                    <div className="flex justify-between items-start gap-3">
                        <div>
                            <div className="font-black text-rose-700 text-sm mb-2 uppercase tracking-wide">กรุณาตรวจสอบข้อมูล</div>
                            <ul className="space-y-1">
                                {errors.map((e, i) => (
                                    <li key={i} className="text-rose-600 text-xs font-bold flex items-start gap-1.5">
                                        <span className="mt-0.5">•</span>{e}
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <button onClick={onDismiss} className="text-rose-400 font-black text-lg leading-none hover:text-rose-600 shrink-0">✕</button>
                    </div>
                </div>
            );
        };

        const AppointmentCard = ({ patient, appt }) => {
            const vaccines = appt.calculatedDates ? [...new Set(appt.calculatedDates.map(d => d.category))] : [];
            
            const getCategoryTitle = (cat) => {
                if (cat === 'dT') return 'วัคซีนบาดทะยัก';
                if (cat === 'PCEC') return 'วัคซีนพิษสุนัขบ้า (Rabies Vaccine)';
                return `ตารางนัดฉีดวัคซีน ${cat}`;
            };

            return (
                <div className="print-area bg-white p-[4mm] text-black border border-slate-300 shadow-2xl print:shadow-none print:border-none print:m-0 print:p-[4mm] overflow-hidden flex flex-col relative font-sans leading-tight mx-auto">
                    
                    {/* ลายน้ำ */}
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-[0.25] pointer-events-none watermark">
                        <img src="https://img1.pic.in.th/images/1bf299103031b07d1.png" alt="Watermark" className="w-[75mm] h-auto object-contain logo-bw" onError={(e) => e.target.style.display = 'none'} />
                    </div>

                    <div className="w-full flex justify-between items-center mb-1 relative z-10">
                        <div className="w-1/2 text-left pr-1 space-y-0.5">
                            <h2 className="text-[13px] font-black uppercase leading-none tracking-tighter text-black">ใบนัดรับบริการทางการแพทย์</h2>
                            <div className="text-[8px] text-black font-bold uppercase tracking-tight opacity-90">Hospital Appointment Card</div>
                            <div className="text-[8px] text-black font-bold leading-none">โรงพยาบาลเจาะไอร้อง จ.นราธิวาส</div>
                        </div>
                        <div className="w-1/2 flex justify-end">
                            <img src="https://img2.pic.in.th/287f1f6b3482c3114.jpg" alt="Hospital Logo" className="header-logo max-h-[45px] object-contain mix-blend-multiply logo-bw" onError={(e) => e.target.style.display = 'none'} />
                        </div>
                    </div>

                    <div className="space-y-1 mb-1.5 relative z-10 text-black">
                        {/* แถวที่ 1: ชื่อ-สกุล และ HN */}
                        <div className="flex justify-between items-end border-b border-dotted border-black pb-0.5 gap-1">
                            <div className="flex items-baseline flex-1 min-w-0">
                                <strong className="text-[11px] shrink-0 mr-1 font-bold">ชื่อ-สกุล:</strong> 
                                {patient && patient.fname ? (
                                    <div className="text-[13px] font-black px-1 uppercase tracking-tight leading-none flex-1 min-w-0 flex items-baseline">
                                        <span className="truncate">{`${safeStr(patient.pname)}${safeStr(patient.fname)} ${safeStr(patient.lname)}`}</span>
                                        {patient.birthday && calculateAge(patient.birthday) !== '' && (
                                            <span className="ml-1 shrink-0 whitespace-nowrap text-[11px]">อายุ {calculateAge(patient.birthday)} ปี</span>
                                        )}
                                    </div>
                                ) : (
                                    <div className="text-[13px] font-black px-1 uppercase tracking-tight leading-none truncate flex-1 min-w-0">
                                        .......................................
                                    </div>
                                )}
                            </div>
                            <div className="text-[11px] shrink-0 font-bold whitespace-nowrap">
                                <strong>HN:</strong> <span className="text-[14px] font-black ml-1">{patient && patient.hn ? safeStr(patient.hn) : '.......'}</span>
                            </div>
                        </div>
                        
                        {/* แถวที่ 2: สิทธิ และ นน. */}
                        <div className="flex justify-between items-end border-b border-dotted border-black pb-0.5 gap-1">
                            <div className="flex items-baseline flex-1 min-w-0">
                                <strong className="text-[11px] shrink-0 mr-1 font-bold">สิทธิ:</strong> 
                                <div className="text-[13px] font-black px-1 uppercase tracking-tight leading-none truncate">
                                    {appt.privilege ? safeStr(appt.privilege) : '.......................................'}
                                </div>
                            </div>
                            <div className="text-[11px] shrink-0 font-bold whitespace-nowrap">
                                <strong>นน.:</strong> <span className="text-[14px] font-black mx-1">{appt.weight ? safeStr(appt.weight) : '...'}</span> กก.
                            </div>
                        </div>

                        <div className="flex justify-between pt-0.5 text-[8.5px] font-medium text-black">
                            <div><strong className="font-bold">วันที่รับบริการ:</strong> {formatThaiDate(appt.visitDate, {day:'numeric', month:'long', year:'numeric'})}</div>
                            <div><strong className="font-bold">เวลาพิมพ์:</strong> {new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })} น.</div>
                        </div>
                    </div>

                    <div className="mb-1.5 relative z-10">
                        <div className="bg-gray-100 border border-black px-1 py-0.5 flex items-center gap-1 print:bg-transparent">
                            <span className="text-[9px] font-black uppercase tracking-widest leading-none text-black">แผนการรักษา (Wound Care)</span>
                        </div>
                        <table className="w-full text-[9px] border-collapse border-x border-b border-black">
                            <tbody>
                                <tr className="border-b border-black">
                                    <td className="px-1.5 py-0.5 border-r border-black w-1/2 text-black font-bold"><strong>ลักษณะ:</strong> {appt.woundType ? safeStr(appt.woundType.split(' ')[0]) : '-'}</td>
                                    <td className="px-1.5 py-0.5 text-black font-bold"><strong>ตำแหน่ง:</strong> {appt.woundLocation ? safeStr(appt.woundLocation) : '-'}</td>
                                </tr>
                                <tr>
                                    <td className="px-1.5 py-0.5 border-r border-black font-black text-black"><strong>ทำแผล:</strong> {safeStr(appt.dressingFrequency)}</td>
                                    <td className="px-1.5 py-0.5 font-black text-black"><strong>จำนวน:</strong> {appt.stitchCount ? `${appt.stitchCount} เข็ม` : '-'}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    {vaccines.map((cat) => (
                        <div key={cat} className="mb-1 relative z-10">
                            <div className="bg-gray-100 border border-black px-1 py-0.5 flex items-center gap-1 print:bg-transparent">
                                <span className="text-[9px] font-black uppercase tracking-widest leading-none text-black">{getCategoryTitle(cat)}</span>
                            </div>
                            <table className="w-full text-[9px] border-collapse border-x border-b border-black">
                                <thead>
                                    <tr className="bg-gray-50 border-b border-black font-black text-[8px]">
                                        <th className="px-1 py-[2px] text-left border-r border-black text-black">รายการ</th>
                                        <th className="px-1 py-[2px] text-left border-r border-black w-20 text-black text-center">วันที่นัด</th>
                                        <th className="px-1 py-[2px] text-center w-10 text-black italic">ผู้ฉีด</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {appt.calculatedDates.filter(d => d.category === cat).map((item, idx) => (
                                        <tr key={idx} className="border-b border-black last:border-b-0 leading-tight">
                                            <td className="px-1 py-[2px] border-r border-black leading-tight">
                                                <div className="font-black text-black text-[9px]">{safeStr(item.label)}</div>
                                                <div className="text-[7px] text-black font-bold leading-none mt-0.5">{safeStr(item.desc)}</div>
                                            </td>
                                            <td className="px-1 py-[2px] border-r border-black font-black text-[10px] text-black text-center">
                                                {formatThaiDate(item.date, { day: 'numeric', month: 'short', year: '2-digit' })}
                                            </td>
                                            <td className="px-1 py-[2px] text-center text-[7.5px] text-black font-black italic">
                                                {safeStr(item.status) === 'ฉีดแล้ว' ? '✓ ฉีด' : '........'}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    ))}

                    {appt.stitchRemovalDate && (
                        <div className="border-[1.5px] border-black p-1 text-center rounded-[8px] bg-gray-50 print:bg-transparent mb-1 shadow-sm border-dashed relative z-10">
                            <div className="text-[9px] font-black uppercase text-black flex items-center justify-center gap-1 leading-none mb-0.5">กำหนดนัดตัดไหม (Stitches Off)</div>
                            <div className="text-[14px] font-black text-black underline decoration-double underline-offset-2 tracking-tighter">
                                {formatThaiDate(appt.stitchRemovalDate, { day: 'numeric', month: 'long', year: 'numeric' })}
                            </div>
                        </div>
                    )}

                    <div className="mt-auto flex flex-col gap-0.5 relative z-10">
                        <div className="text-center py-0.5">
                            <div className="text-[11px] font-black text-black flex items-center justify-center gap-1 uppercase tracking-[0.02em] leading-none">"เจ็บป่วยฉุกเฉินโทร 1669 ตลอด 24 ชม."</div>
                        </div>
                        <div className="flex justify-between items-end text-[8px] pt-1 border-t border-black opacity-100 leading-none">
                            <div className="italic font-bold leading-tight space-y-0.5 text-black">
                                <div className="text-black font-black">* กรุณานำใบนัดใบนี้มาด้วยทุกครั้งที่เข้ารับบริการ</div>
                                <div className="text-black font-mono tracking-tighter uppercase text-[7px]">CHOAIRONG HOSPITAL | WOUNDCARE-V-ONLINE</div>
                            </div>
                            <div className="text-center min-w-[80px] text-black">
                                <div className="font-black uppercase text-[9px] border-b-[1px] border-black pb-[2px] mb-[2px]">{safeStr(appt.staffName)}</div>
                                <div className="text-[7px] font-black uppercase tracking-widest leading-none">Authorized</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState('app'); 
            const [searchHn, setSearchHn] = useState('');
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [isManualEntry, setIsManualEntry] = useState(false);
            const [loading, setLoading] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [validationErrors, setValidationErrors] = useState([]);

            // เพิ่ม State สำหรับหน้ารายชื่อนัด
            const [filterDate, setFilterDate] = useState(() => new Date().toLocaleDateString('en-CA'));
            const [localAppointments, setLocalAppointments] = useState(() => {
                try { return JSON.parse(localStorage.getItem('woundcare_appointments_db') || '[]'); } 
                catch (e) { return []; }
            });

            const [sheetId, setSheetId] = useState('19T9hWcWuKN3ppXduyTsBhATN_a8GB5NSd3l_38s4AAE');
            const [scriptUrl, setScriptUrl] = useState('https://script.google.com/macros/s/AKfycbwz2m0JbmzhgKFlWUxcaXVCNYfn8yYD-o7UNQS9PDT7aEuZXKxnr3UlQN4w6ovuizM/exec'); 

            const [dtSchedule, setDtSchedule] = useState('none'); 
            const [pcecSchedule, setPcecSchedule] = useState('none');

            // โหลด draft จาก localStorage
            const [appointment, setAppointment] = useState(() => {
                try {
                    const saved = localStorage.getItem(DRAFT_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        return { ...defaultAppointment, ...parsed };
                    }
                } catch (e) { console.error(e) }
                return defaultAppointment;
            });

            useEffect(() => {
                try {
                    const { calculatedDates, ...rest } = appointment;
                    localStorage.setItem(DRAFT_KEY, JSON.stringify(rest));
                } catch (e) {}
            }, [appointment]);

            useEffect(() => {
                try {
                    const savedPatient = localStorage.getItem(DRAFT_KEY + '_patient');
                    if (savedPatient) {
                        const { patient: p, wasManual } = JSON.parse(savedPatient);
                        setSelectedPatient(p);
                        setIsManualEntry(wasManual === true);
                    }
                } catch (e) {}
            }, []);

            useEffect(() => {
                try {
                    if (selectedPatient) {
                        localStorage.setItem(DRAFT_KEY + '_patient', JSON.stringify({
                            patient: selectedPatient,
                            wasManual: isManualEntry 
                        }));
                    }
                } catch (e) {}
            }, [selectedPatient, isManualEntry]);

            const showNotification = (msg, type = 'success') => {
                setToast({ show: true, message: msg, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3500);
            };

            const clearDraft = () => {
                try {
                    localStorage.removeItem(DRAFT_KEY);
                    localStorage.removeItem(DRAFT_KEY + '_patient');
                } catch (e) {}
            };

            const toggleManualEntry = () => {
                const nextManualState = !isManualEntry;
                setIsManualEntry(nextManualState);
                setSelectedPatient(nextManualState ? { hn: searchHn, pname: '', fname: '', lname: '', privilege: '', cid: '', birthday: '' } : null);
            };

            // คำนวณวันนัดวัคซีนอัตโนมัติ
            useEffect(() => {
                let dates = [];
                const start = appointment.visitDate;
                
                if (pcecSchedule === 'PCEC_IM_Essen') {
                    [0, 3, 7, 14, 28].forEach((d, i) => dates.push({ label: `SPEEDA #${i + 1} (D${d})`, date: addDays(start, d), desc: 'IM (0.5 ml) แขน 1 ข้าง', status: d === 0 ? 'ฉีดแล้ว' : 'นัดหมาย', category: 'PCEC' }));
                } else if (pcecSchedule === 'PCEC_ID_TRC') {
                    [0, 3, 7, 28].forEach((d, i) => dates.push({ label: `SPEEDA #${i + 1} (D${d})`, date: addDays(start, d), desc: 'ID (0.1 ml) 2 ข้างพร้อมกัน', status: d === 0 ? 'ฉีดแล้ว' : 'นัดหมาย', category: 'PCEC' }));
                } else if (pcecSchedule === 'PCEC_booster_lt_6m_IM') {
                    dates.push({ label: 'SPEEDA Booster (D0)', date: start, desc: 'IM (0.5 ml) แขน 1 ข้าง', status: 'ฉีดแล้ว', category: 'PCEC' });
                } else if (pcecSchedule === 'PCEC_booster_lt_6m_ID') {
                    dates.push({ label: 'SPEEDA Booster (D0)', date: start, desc: 'ID (0.1 ml) 1 จุด', status: 'ฉีดแล้ว', category: 'PCEC' });
                } else if (pcecSchedule === 'PCEC_booster_gt_6m_IM') {
                    [0, 3].forEach((d, i) => dates.push({ label: `SPEEDA Booster #${i + 1} (D${d})`, date: addDays(start, d), desc: 'IM (0.5 ml) แขน 1 ข้าง', status: d === 0 ? 'ฉีดแล้ว' : 'นัดหมาย', category: 'PCEC' }));
                } else if (pcecSchedule === 'PCEC_booster_gt_6m_ID') {
                    [0, 3].forEach((d, i) => dates.push({ label: `SPEEDA Booster #${i + 1} (D${d})`, date: addDays(start, d), desc: 'ID (0.1 ml) 1 จุด', status: d === 0 ? 'ฉีดแล้ว' : 'นัดหมาย', category: 'PCEC' }));
                }

                if (dtSchedule === 'dT_new') {
                    dates.push(
                        { label: 'dT เข็ม 1', date: start, desc: 'IM (0.5 ml)', status: 'ฉีดแล้ว', category: 'dT' },
                        { label: 'dT เข็ม 2 (+1ด)', date: addMonths(start, 1), desc: 'IM (0.5 ml)', status: 'นัดหมาย', category: 'dT' },
                        { label: 'dT เข็ม 3 (+6ด)', date: addMonths(addMonths(start, 1), 6), desc: 'IM (0.5 ml)', status: 'นัดหมาย', category: 'dT' }
                    );
                } else if (dtSchedule === 'dT_booster') {
                    dates.push({ label: 'dT (กระตุ้น)', date: start, desc: 'IM (0.5 ml) เข้ากล้ามเนื้อ', status: 'ฉีดแล้ว', category: 'dT' });
                }
                setAppointment(prev => ({ ...prev, calculatedDates: dates }));
            }, [appointment.visitDate, pcecSchedule, dtSchedule]);

            const handleSearch = async () => {
                const trimmedHn = String(searchHn).trim();
                if (!trimmedHn) return;
                setLoading(true);
                try {
                    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=patients`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Fetch failed");
                    const csvText = await response.text();
                    if (csvText.includes("<!DOCTYPE html>")) throw new Error("NOT_PUBLISHED");
                    const lines = csvText.split('\n');
                    const headers = lines[0].replace(/"/g, '').split(',');
                    let found = null;
                    for (let i = 1; i < lines.length; i++) {
                        const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                        const row = {};
                        headers.forEach((h, idx) => row[h.trim().toLowerCase()] = cols[idx]);
                        if (String(row.hn) === trimmedHn) {
                            found = { hn: row.hn, pname: row.pname || '', fname: row.fname || '', lname: row.lname || '', cid: row.cid || '', birthday: row.birthday || '-' };
                            break;
                        }
                    }
                    if (found) {
                        setSelectedPatient(found);
                        setIsManualEntry(false);
                        showNotification("ค้นหาข้อมูลคนไข้สำเร็จ", "success");
                    } else { showNotification("ไม่พบ HN นี้ในระบบ", "error"); }
                } catch (err) { 
                    const msg = err.message === "NOT_PUBLISHED" ? "โปรดตรวจสอบการ Publish CSV ใน Sheets" : "เชื่อมต่อ Google Sheets ไม่ได้";
                    showNotification(msg, "error"); 
                } finally { setLoading(false); }
            };

            const handleSave = async () => {
                const errors = validateAppointment(selectedPatient, appointment);
                if (errors.length > 0) {
                    setValidationErrors(errors);
                    return;
                }

                setLoading(true);
                try {
                    const payload = {
                        visitDate: appointment.visitDate,
                        patientHn: `'${String(selectedPatient.hn)}`,
                        patientName: `${selectedPatient.pname}${selectedPatient.fname} ${selectedPatient.lname}`,
                        weight: appointment.weight,
                        privilege: appointment.privilege,
                        woundType: appointment.woundType,
                        woundLocation: appointment.woundLocation,
                        stitchCount: appointment.stitchCount,
                        dressingFrequency: appointment.dressingFrequency,
                        stitchRemovalDate: appointment.stitchRemovalDate,
                        staffName: appointment.staffName,
                        createdAt: new Date().toLocaleString('th-TH')
                    };
                    
                    const response = await fetch(scriptUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error: ${response.status}`);
                    }

                    let result = null;
                    try { result = await response.json(); } catch (e) {}

                    if (result && result.status === 'error') {
                        throw new Error(result.message || 'Apps Script error');
                    }

                    // บันทึกนัดหมายในอนาคตลง localStorage สำหรับหน้ารายชื่อ
                    const futureAppts = [];
                    if (appointment.stitchRemovalDate) {
                        futureAppts.push({
                            id: Date.now() + Math.random(),
                            hn: selectedPatient.hn,
                            name: `${selectedPatient.pname}${selectedPatient.fname} ${selectedPatient.lname}`,
                            date: appointment.stitchRemovalDate,
                            type: 'ตัดไหม (Suture Removal)',
                            createdAt: new Date().toISOString()
                        });
                    }
                    if (appointment.calculatedDates) {
                        appointment.calculatedDates.forEach(d => {
                            if (d.status === 'นัดหมาย') {
                                futureAppts.push({
                                    id: Date.now() + Math.random(),
                                    hn: selectedPatient.hn,
                                    name: `${selectedPatient.pname}${selectedPatient.fname} ${selectedPatient.lname}`,
                                    date: d.date,
                                    type: `ฉีดวัคซีน: ${d.label}`,
                                    createdAt: new Date().toISOString()
                                });
                            }
                        });
                    }
                    if (futureAppts.length > 0) {
                        const updatedAppts = [...localAppointments, ...futureAppts];
                        setLocalAppointments(updatedAppts);
                        localStorage.setItem('woundcare_appointments_db', JSON.stringify(updatedAppts));
                    }

                    showNotification("บันทึกนัดหมายลง Google Sheets สำเร็จ ✓", "success");
                    clearDraft();

                } catch (err) { 
                    console.error('Save error:', err);
                    showNotification(`บันทึกไม่สำเร็จ: ${err.message || 'ตรวจสอบการเชื่อมต่อ'}`, "error"); 
                } finally { setLoading(false); }
            };

            const handlePrint = () => {
                const errors = validateAppointment(selectedPatient, appointment);
                if (errors.length > 0) {
                    setValidationErrors(errors);
                    return;
                }
                window.print();
            };

            const handleClearDraft = () => {
                clearDraft();
                setSelectedPatient(null);
                setIsManualEntry(false);
                setSearchHn('');
                setDtSchedule('none');
                setPcecSchedule('none');
                setAppointment(defaultAppointment);
                showNotification("ล้างข้อมูลแล้ว พร้อมเริ่มใหม่", "success");
            };

            return (
                <div className="min-h-screen relative">
                    <ValidationErrors errors={validationErrors} onDismiss={() => setValidationErrors([])} />

                    {/* Toast Notification */}
                    {toast.show && (
                        <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 z-[200] flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl animate-bounce ${toast.type === 'success' ? 'bg-emerald-600 text-white' : 'bg-rose-600 text-white'}`}>
                            <span className="font-bold text-base">{toast.message}</span>
                            <button onClick={() => setToast({ ...toast, show: false })} className="ml-2 font-black">✕</button>
                        </div>
                    )}

                    {/* Loading Overlay */}
                    {loading && (
                        <div className="fixed inset-0 z-[150] bg-black/20 backdrop-blur-sm flex items-center justify-center">
                            <div className="bg-white rounded-3xl px-8 py-6 shadow-2xl flex items-center gap-4">
                                <div className="w-6 h-6 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div>
                                <span className="font-black text-slate-700">กำลังดำเนินการ...</span>
                            </div>
                        </div>
                    )}

                    <div className="p-2 md:p-6 max-w-7xl mx-auto">
                        <header className="print:hidden mb-4 flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-3xl shadow-sm border border-slate-200 gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-emerald-600 p-2.5 rounded-2xl text-white shadow-lg font-black uppercase tracking-widest">W</div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800 leading-none tracking-tight">ใบนัดรับบริการทางการแพทย์</h1>
                                    <div className="text-[11px] text-slate-500 font-bold uppercase mt-1 tracking-wider">Hospital Appointment Card</div>
                                </div>
                            </div>
                            <div className="flex flex-wrap md:flex-nowrap gap-2 w-full md:w-auto">
                                <button onClick={() => setMode(mode === 'list' ? 'app' : 'list')} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-blue-50 text-blue-600 px-4 py-2.5 rounded-2xl font-black hover:bg-blue-100 transition active:scale-95 border border-blue-200 uppercase text-xs">📅 รายชื่อนัด</button>
                                <button onClick={handleClearDraft} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-rose-50 text-rose-500 px-4 py-2.5 rounded-2xl font-black hover:bg-rose-100 transition active:scale-95 border border-rose-200 uppercase text-xs">Clear</button>
                                <button onClick={() => setMode(mode === 'settings' ? 'app' : 'settings')} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-slate-50 text-slate-600 px-4 py-2.5 rounded-2xl font-black hover:bg-slate-100 transition active:scale-95 border border-slate-200 uppercase text-xs">Settings</button>
                                {mode === 'app' && <button onClick={handleSave} disabled={loading} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-emerald-600 text-white px-6 py-2.5 rounded-2xl font-black hover:bg-emerald-700 disabled:bg-slate-200 transition shadow-md active:scale-95 uppercase text-xs">Save</button>}
                                {mode === 'app' && <button onClick={handlePrint} disabled={loading} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-slate-900 text-white px-6 py-2.5 rounded-2xl font-black hover:bg-slate-800 disabled:bg-slate-200 transition shadow-md active:scale-95 uppercase text-xs">Print</button>}
                            </div>
                        </header>

                        {mode === 'list' ? (
                            <div className="print:hidden max-w-5xl mx-auto animate-in fade-in duration-300 pb-20">
                                <div className="bg-white p-6 md:p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                                        <h2 className="text-lg font-black text-slate-800 uppercase tracking-wide flex items-center gap-2">
                                            <span className="text-2xl">📅</span> รายชื่อผู้ป่วยนัดหมาย
                                        </h2>
                                        <div className="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl border border-slate-200 w-full md:w-auto">
                                            <label className="text-xs font-black text-slate-500 uppercase px-2 shrink-0">เลือกวันที่นัด</label>
                                            <input type="date" className="flex-1 md:w-auto p-2.5 rounded-xl border border-slate-200 text-sm font-black outline-none bg-white focus:ring-2 focus:ring-blue-100" value={filterDate} onChange={e => setFilterDate(e.target.value)} />
                                            <button onClick={() => setFilterDate(new Date().toLocaleDateString('en-CA'))} className="px-3 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-black hover:bg-slate-100 transition active:scale-95 text-slate-600 shrink-0">วันนี้</button>
                                        </div>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="text-xs text-slate-500 uppercase bg-slate-50">
                                                <tr>
                                                    <th className="px-4 py-3 font-black rounded-tl-2xl">ลำดับ</th>
                                                    <th className="px-4 py-3 font-black">HN</th>
                                                    <th className="px-4 py-3 font-black">ชื่อ-สกุล</th>
                                                    <th className="px-4 py-3 font-black">ประเภทการนัด</th>
                                                    <th className="px-4 py-3 font-black text-center rounded-tr-2xl">จัดการ</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {localAppointments.filter(a => a.date === filterDate).length === 0 ? (
                                                    <tr>
                                                        <td colSpan="5" className="px-4 py-12 text-center">
                                                            <div className="text-slate-400 font-bold text-base mb-1">ไม่มีรายชื่อผู้ป่วยที่นัดในวันนี้</div>
                                                            <div className="text-slate-300 text-xs font-medium">({formatThaiDate(filterDate, {day:'numeric', month:'long', year:'numeric'})})</div>
                                                        </td>
                                                    </tr>
                                                ) : (
                                                    localAppointments
                                                        .filter(a => a.date === filterDate)
                                                        .map((appt, idx) => (
                                                            <tr key={appt.id} className="border-b border-slate-100 hover:bg-slate-50/50">
                                                                <td className="px-4 py-3 font-bold text-slate-500">{idx + 1}</td>
                                                                <td className="px-4 py-3 font-black text-emerald-600">{appt.hn}</td>
                                                                <td className="px-4 py-3 font-bold">{appt.name}</td>
                                                                <td className="px-4 py-3 font-bold">
                                                                    <span className={`px-2.5 py-1 rounded-lg text-[10px] uppercase tracking-wider ${appt.type.includes('ตัดไหม') ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`}>
                                                                        {appt.type}
                                                                    </span>
                                                                </td>
                                                                <td className="px-4 py-3 text-center">
                                                                    <button onClick={() => {
                                                                        const updated = localAppointments.filter(a => a.id !== appt.id);
                                                                        setLocalAppointments(updated);
                                                                        localStorage.setItem('woundcare_appointments_db', JSON.stringify(updated));
                                                                    }} className="text-rose-400 hover:text-rose-600 font-black text-xs px-2 py-1 bg-rose-50 hover:bg-rose-100 rounded-lg transition active:scale-95">ลบ</button>
                                                                </td>
                                                            </tr>
                                                        ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="mt-4 text-[10px] text-slate-400 font-bold text-right border-t border-slate-100 pt-3">
                                        * ข้อมูลรายชื่อนัดหมายถูกดึงและบันทึกจากประวัติการกด Save ในบราวเซอร์เครื่องนี้เท่านั้น
                                    </div>
                                </div>
                            </div>
                        ) : mode === 'settings' ? (
                            <div className="print:hidden max-w-xl mx-auto py-8 animate-in fade-in duration-300">
                                <div className="bg-white p-8 rounded-[40px] border border-slate-200 shadow-xl space-y-6 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-slate-800"></div>
                                    <h1 className="text-xl font-black text-slate-800 uppercase tracking-widest text-center">Settings & Configuration</h1>
                                    
                                    <div className="bg-amber-50 border border-amber-200 p-4 rounded-2xl text-sm text-amber-800">
                                        <strong>⚠️ คำเตือนเรื่อง PDPA:</strong> การดึงข้อมูล HN และชื่อคนไข้ผ่าน Google Sheets ที่แชร์แบบ Public อาจทำให้ข้อมูลส่วนบุคคลรั่วไหล แนะนำให้ใช้สำหรับทดสอบเท่านั้น หากใช้จริงควรปรับเป็น API ที่มีการยืนยันตัวตน (Authentication)
                                    </div>

                                    <div className="space-y-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-3">Google Sheet ID (สำหรับดึงข้อมูลคนไข้)</label>
                                            <input className="w-full p-4 rounded-2xl border border-slate-200 font-mono text-xs focus:ring-4 focus:ring-emerald-500/10 outline-none" value={sheetId} onChange={e => setSheetId(e.target.value)} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-3">Apps Script Web App URL (สำหรับบันทึกข้อมูล)</label>
                                            <input className="w-full p-4 rounded-2xl border border-slate-200 font-mono text-xs focus:ring-4 focus:ring-emerald-500/10 outline-none" value={scriptUrl} onChange={e => setScriptUrl(e.target.value)} />
                                        </div>
                                        <button onClick={() => setMode('app')} className="w-full bg-slate-900 text-white py-4 rounded-3xl font-black shadow-lg uppercase active:scale-95 transition-all text-sm tracking-widest mt-4">Go Back to App</button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                                <div className="lg:col-span-5 space-y-4 pb-20 print:hidden">
                                    
                                    {(selectedPatient || appointment.woundType || appointment.privilege || appointment.weight) && (
                                        <div className="bg-amber-50 border border-amber-200 rounded-2xl px-4 py-2 flex items-center gap-2">
                                            <span className="w-2 h-2 rounded-full bg-amber-400 animate-pulse inline-block"></span>
                                            <span className="text-xs font-black text-amber-700">บันทึก Draft อัตโนมัติแล้ว (ข้อมูลจะไม่หายถ้ารีเฟรช)</span>
                                        </div>
                                    )}

                                    <div className="bg-white p-5 rounded-[2.5rem] border border-slate-200 shadow-sm transition-all hover:shadow-md">
                                        <div className="flex justify-between items-center mb-4 px-2">
                                            <h2 className="text-xs flex items-center gap-2 text-emerald-700 uppercase tracking-widest font-black">PATIENT INFO</h2>
                                            <button onClick={toggleManualEntry} className="text-[10px] bg-slate-50 px-3 py-1.5 rounded-xl hover:bg-emerald-600 hover:text-white transition-all text-slate-700 font-black border active:scale-95 shadow-sm uppercase">
                                                {isManualEntry ? 'เปลี่ยนไปใช้ช่องค้นหา' : 'กรอกข้อมูลเอง (Manual)'}
                                            </button>
                                        </div>
                                        
                                        {!isManualEntry ? (
                                            <div className="flex gap-2 mb-4">
                                                <input type="text" placeholder="ระบุ HN..." className="flex-1 p-3.5 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-emerald-100 outline-none text-sm font-black bg-slate-50 transition-all placeholder:text-slate-400" value={searchHn} onChange={e => setSearchHn(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSearch()} />
                                                <button onClick={handleSearch} disabled={loading} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 rounded-2xl transition active:scale-95 shadow-lg shadow-emerald-100 disabled:bg-slate-300 font-black uppercase tracking-tighter">SEARCH</button>
                                            </div>
                                        ) : (
                                            <div className="space-y-2.5 mb-4 animate-in fade-in duration-300 bg-slate-50 p-4 rounded-3xl border border-slate-100">
                                                <input type="text" placeholder="HN" className="w-full p-3 rounded-2xl border border-slate-200 text-sm font-black bg-white outline-none focus:ring-2 focus:ring-emerald-100" value={selectedPatient?.hn || ''} onChange={e => setSelectedPatient({...selectedPatient, hn: e.target.value})} />
                                                <div className="grid grid-cols-3 gap-2">
                                                    <input type="text" placeholder="คำนำหน้า" className="p-3 rounded-2xl border border-slate-200 text-sm bg-white font-bold outline-none focus:ring-2 focus:ring-emerald-100" value={selectedPatient?.pname || ''} onChange={e => setSelectedPatient({...selectedPatient, pname: e.target.value})} />
                                                    <input type="text" placeholder="ชื่อ" className="col-span-2 p-3 rounded-2xl border border-slate-200 text-sm font-black bg-white outline-none focus:ring-2 focus:ring-emerald-100" value={selectedPatient?.fname || ''} onChange={e => setSelectedPatient({...selectedPatient, fname: e.target.value})} />
                                                </div>
                                                <input type="text" placeholder="นามสกุล" className="w-full p-3 rounded-2xl border border-slate-200 text-sm font-black bg-white outline-none focus:ring-2 focus:ring-emerald-100" value={selectedPatient?.lname || ''} onChange={e => setSelectedPatient({...selectedPatient, lname: e.target.value})} />
                                            </div>
                                        )}
                                        
                                        <div className="space-y-3 mb-2">
                                            <div className="flex flex-col gap-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-tighter">วันที่รับบริการ (Visit Date)</label>
                                                <div className="flex gap-2">
                                                    <input type="date" className="flex-1 p-3.5 rounded-2xl border border-slate-200 text-sm font-black outline-none bg-slate-50 focus:ring-2 focus:ring-emerald-100 transition-all" value={appointment.visitDate} onChange={e => setAppointment({...appointment, visitDate: e.target.value})} />
                                                    <button onClick={() => setAppointment({...appointment, visitDate: new Date().toLocaleDateString('en-CA')})} className="bg-slate-100 px-4 rounded-2xl text-[10px] font-black uppercase hover:bg-slate-200 transition-all active:scale-95 text-slate-600">Today</button>
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="flex flex-col gap-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-tighter">Weight (kg)</label>
                                                    <input type="number" min="1" max="300" step="0.1" className="w-full p-3.5 rounded-2xl border border-slate-200 text-sm font-black outline-none bg-slate-50 focus:ring-2 focus:ring-emerald-100 transition-all" value={appointment.weight} onChange={e => setAppointment({...appointment, weight: e.target.value})} />
                                                </div>
                                                <div className="flex flex-col gap-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-tighter">Privilege</label>
                                                    <select className="p-3.5 border border-slate-200 rounded-2xl text-xs bg-slate-50 font-black outline-none cursor-pointer focus:ring-2 focus:ring-emerald-100 transition-all" value={appointment.privilege} onChange={e => setAppointment({...appointment, privilege: e.target.value})}>
                                                        <option value="">-- เลือกสิทธิ --</option>{PRIVILEGES.map(p => <option key={p} value={p}>{p}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white p-5 rounded-[2.5rem] border border-slate-200 shadow-sm space-y-4 transition-all hover:shadow-md">
                                        <h2 className="text-xs text-emerald-700 uppercase tracking-widest font-black">TREATMENT PLAN</h2>
                                        <div className="grid grid-cols-2 gap-3">
                                            <select className="p-3.5 border border-slate-200 rounded-2xl text-xs bg-white font-bold outline-none shadow-sm focus:ring-2 focus:ring-emerald-100" value={appointment.woundType} onChange={e => setAppointment({...appointment, woundType: e.target.value})}><option value="">-- แผล --</option>{WOUND_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select>
                                            <select className="p-3.5 border border-slate-200 rounded-2xl text-xs bg-white font-bold outline-none shadow-sm focus:ring-2 focus:ring-emerald-100" value={appointment.woundLocation} onChange={e => setAppointment({...appointment, woundLocation: e.target.value})}><option value="">-- ตำแหน่ง --</option>{BODY_LOCATIONS.map(loc => <option key={loc} value={loc}>{loc}</option>)}</select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="number" min="0" max="200" placeholder="จำนวนเข็ม" className="p-3.5 border border-slate-200 rounded-2xl text-xs font-black outline-none bg-white shadow-sm focus:ring-2 focus:ring-emerald-100" value={appointment.stitchCount} onChange={e => setAppointment({...appointment, stitchCount: e.target.value})} />
                                            <div className="grid grid-cols-3 gap-1">
                                                {['ทุกวัน', 'วันเว้นวัน', 'ไม่ต้องล้างแผล'].map(f => (
                                                    <button 
                                                        key={f} 
                                                        onClick={() => setAppointment({...appointment, dressingFrequency: f})} 
                                                        className={`py-2 rounded-2xl text-[9px] font-black border transition-all ${appointment.dressingFrequency === f ? 'bg-blue-600 text-white border-blue-600 shadow-md scale-[1.02]' : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-600'}`}
                                                    >
                                                        {f}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-3xl border border-slate-100 shadow-inner mt-2">
                                            <div className="text-[10px] font-black text-slate-400 uppercase mb-2">SUTURE REMOVAL DATE (กำหนดตัดไหม)</div>
                                            <input type="date" className="w-full p-3.5 border border-slate-200 rounded-2xl text-xs font-black outline-none bg-white mb-2 shadow-sm focus:ring-4 focus:ring-blue-100 transition-all" value={appointment.stitchRemovalDate} onChange={e => setAppointment({...appointment, stitchRemovalDate: e.target.value})} />
                                            <div className="flex gap-2">
                                                {[5, 7, 10].map(d => (
                                                    <button key={d} onClick={() => setAppointment({...appointment, stitchRemovalDate: addDays(appointment.visitDate, d)})} className="flex-1 bg-white hover:bg-blue-50 py-2.5 rounded-2xl border border-slate-200 text-[10px] font-black transition-all shadow-sm active:scale-95 text-slate-700">+{d} วัน</button>
                                                ))}
                                                <button onClick={() => setAppointment({...appointment, stitchRemovalDate: ''})} className="flex-1 bg-rose-50 text-rose-600 border border-rose-100 px-2 rounded-2xl text-[10px] font-black hover:bg-rose-100 transition-all active:scale-95 uppercase tracking-widest">Clear</button>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white p-5 rounded-[2.5rem] border border-slate-200 shadow-sm space-y-3 transition-all hover:shadow-md">
                                        <h2 className="text-xs text-emerald-700 uppercase tracking-widest font-black">VACCINES SCHEDULE</h2>
                                        <select className="w-full p-4 rounded-2xl border border-slate-200 text-xs font-black bg-white outline-none shadow-sm focus:ring-4 focus:ring-blue-100 transition-all" value={dtSchedule} onChange={e => setDtSchedule(e.target.value)}>
                                            <option value="none">-- บาดทะยัก (dT) --</option>
                                            <option value="dT_booster">dT : กระตุ้น 1 เข็ม</option>
                                            <option value="dT_new">dT : เริ่มฉีดใหม่ (3 เข็ม)</option>
                                        </select>
                                        <select className="w-full p-4 rounded-2xl border border-slate-200 text-xs font-black bg-white outline-none shadow-sm focus:ring-4 focus:ring-blue-100 transition-all" value={pcecSchedule} onChange={e => setPcecSchedule(e.target.value)}>
                                            <option value="none">-- พิษสุนัขบ้า (Rabies Vaccine) --</option>
                                            <optgroup label="Initial Course">
                                                <option value="PCEC_IM_Essen">IM Essen (0, 3, 7, 14, 28)</option>
                                                <option value="PCEC_ID_TRC">ID Modified TRC (0, 3, 7, 28)</option>
                                            </optgroup>
                                            <optgroup label="Booster (น้อยกว่า 6 เดือน)">
                                                <option value="PCEC_booster_lt_6m_IM">IM (0.5 ml) - Day 0</option>
                                                <option value="PCEC_booster_lt_6m_ID">ID (0.1 ml) - Day 0</option>
                                            </optgroup>
                                            <optgroup label="Booster (มากกว่า 6 เดือน)">
                                                <option value="PCEC_booster_gt_6m_IM">IM (0.5 ml) - Day 0, 3</option>
                                                <option value="PCEC_booster_gt_6m_ID">ID (0.1 ml) - Day 0, 3</option>
                                            </optgroup>
                                        </select>
                                    </div>
                                </div>
                                
                                <div className="lg:col-span-7 flex justify-center items-start overflow-auto pb-20 pt-4 lg:pt-0">
                                    <AppointmentCard patient={selectedPatient} appt={appointment} />
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
